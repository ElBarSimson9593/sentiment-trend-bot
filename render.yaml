# Blueprint Render — SentimentTrend Bot (free tier)
# Requiere PostgreSQL externo gratis: https://neon.tech (ver README sección Deploy)
services:
  - type: web
    name: sentiment-trend-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: ALERT_NEGATIVE_THRESHOLD
        value: "3"
      - key: ALERT_WINDOW_MINUTES
        value: "60"
      - key: AUTO_SEED_DEMO
        value: "true"
